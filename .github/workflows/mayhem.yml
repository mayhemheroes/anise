name: Mayhem
on:
  push:
  pull_request:
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Log in to the Container registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: mayhem/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    - name: Start Mayhem analysis for parse_spk
      uses: forallsecure/mcode-action@long-runs
      with:
        mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
        args: --image ${{ steps.meta.outputs.tags }} --file mayhem/parse_spk.mayhemfile
    - name: Start Mayhem analysis for parse_bpc
      uses: forallsecure/mcode-action@long-runs
      with:
        mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
        args: --image ${{ steps.meta.outputs.tags }} --file mayhem/parse_bpc.mayhemfile
    - name: Start Mayhem analysis for load_from_bytes
      uses: forallsecure/mcode-action@long-runs
      with:
        mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
        args: --image ${{ steps.meta.outputs.tags }} --file mayhem/load_from_bytes.mayhemfile
    - name: Start Mayhem analysis for fuzz_metadata
      uses: forallsecure/mcode-action@long-runs
      with:
        mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
        args: --image ${{ steps.meta.outputs.tags }} --file mayhem/fuzz_metadata.mayhemfile
    - name: Start Mayhem analysis for almanac_describe
      uses: forallsecure/mcode-action@long-runs
      with:
        mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
        args: --image ${{ steps.meta.outputs.tags }} --file mayhem/almanac_describe.mayhemfile
    - name: Start Mayhem analysis for common_ephemeris_path
      uses: forallsecure/mcode-action@long-runs
      with:
        mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
        args: --image ${{ steps.meta.outputs.tags }} --file mayhem/common_ephemeris_path.mayhemfile
    - name: Start Mayhem analysis for try_find_ephemeris_root
      uses: forallsecure/mcode-action@long-runs
      with:
        mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
        args: --image ${{ steps.meta.outputs.tags }} --file mayhem/try_find_ephemeris_root.mayhemfile
    - name: Start Mayhem analysis for spacecraft_dataset
      uses: forallsecure/mcode-action@long-runs
      with:
        mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
        args: --image ${{ steps.meta.outputs.tags }} --file mayhem/spacecraft_dataset.mayhemfile
    - name: Start Mayhem analysis for planetary_dataset
      uses: forallsecure/mcode-action@long-runs
      with:
        mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
        args: --image ${{ steps.meta.outputs.tags }} --file mayhem/planetary_dataset.mayhemfile
    - name: Start Mayhem analysis for euler_parameter_dataset
      uses: forallsecure/mcode-action@long-runs
      with:
        mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
        args: --image ${{ steps.meta.outputs.tags }} --file mayhem/euler_parameter_dataset.mayhemfile
